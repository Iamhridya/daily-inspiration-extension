<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Inspiration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>
<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>
<div class="flower f1">🌸</div>
<div class="flower f2">🌷</div>

<div class="container">

  <div class="top-logo">🧘‍♀️</div>
  <h1>Daily Inspiration</h1>

  <div class="quote-card">
    <div class="quote-mark">❝</div>
    <p id="quote">Loading inspiration...</p>
    <button id="saveBtn" class="heart-btn">♡</button>
  </div>

  <div class="actions">
    <button id="newBtn" class="primary-btn">↻ New Quote</button>
  </div>

  <div class="favorites-card">
    <div class="fav-header">
      <h3>Favorites ✨</h3>
      <button id="clearBtn" class="icon-btn">🗑</button>
    </div>
    <ul id="favorites"></ul>
  </div>

  <div class="footer-text">Stay positive, stay inspired ✨</div>

</div>

<script src="popup.js"></script>
</body>
</html>
